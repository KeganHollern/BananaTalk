apiVersion: apps/v1
kind: Deployment
metadata:
  name: bananatalk-backend
  namespace: default
  labels:
    app: bananatalk-backend
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@daily"
    keel.sh/match-tag: "true"
spec:
  replicas: 2
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: bananatalk-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: bananatalk-backend
    spec:
      containers:
        - name: bananatalk-backend
          image: ghcr.io/keganhollern/bananatalk-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          # Liveness only checks the HTTP server is up — a Redis or Postgres
          # blip must not restart pods with active WebRTC signaling sessions.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          # Readiness pings Redis + Postgres so an unhealthy pod is pulled
          # from the Service endpoints without being killed. Tighter cadence
          # than liveness so traffic shifts quickly during a dependency blip.
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
          env:
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
          resources:
            limits:
              cpu: "500m"
              memory: "128Mi"
            requests:
              cpu: "250m"
              memory: "64Mi"
      restartPolicy: Always
